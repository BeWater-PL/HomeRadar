spring.application.name=homeradar

# H2 als Datei-Datenbank (persistiert unter ./data/homeradar.mv.db)
spring.datasource.url=jdbc:h2:file:./data/homeradar
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2-Console unter http://localhost:8080/h2-console
spring.h2.console.enabled=true

# Schema bei Bedarf automatisch aktualisieren
spring.jpa.hibernate.ddl-auto=update

# HomeRadar-Scan-Konfiguration
homeradar.toleranz-minuten=5
homeradar.subnetz=192.168.178
